<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Tests Dashboard</title>
  <link rel="stylesheet" href="../allure-shell.css">
</head>
<body>
{{HEADER}}
  <main class="page">
    <div class="site-shell layout">
      <section class="panel-card">
        <div class="card-header">
          <h2>UI Tests Dashboard</h2>
        </div>
        <div class="card-body">
          <p class="page-intro">Тренды по веткам. Для дерева тестов откройте полный отчёт.</p>
          <p class="note">Dashboard показывает только аналитику. Чтобы кликнуть по тестам, откройте ссылку «полный отчёт» у нужной ветки.</p>
        </div>
      </section>

      <section class="panel-card branch-nav">
        <div class="card-header">
          <h2>Навигация</h2>
        </div>
        <div class="card-body">
          <ul>
            {{BRANCH_LINKS}}
          </ul>
        </div>
      </section>

{{BRANCH_PANELS}}
    </div>
  </main>
{{FOOTER}}
  <script src="../allure-shell.js"></script>
</body>
</html>
