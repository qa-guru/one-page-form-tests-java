<head>

      document.documentElement.setAttribute("data-theme", "dark");
    }
  </script>
  <link rel="stylesheet" href="../allure-shell.css">
</head>
<body>

  <main class="page">
    <div class="site-shell layout">
      <section class="panel-card branch-nav">
        <div class="card-header">
          <h2>Automated Tests Dashboard</h2>
        </div>
        <div class="card-body">
          <ul>
            {{BRANCH_LINKS}}
          </ul>
        </div>
      </section>

{{BRANCH_PANELS}}
    </div>
  </main>
{{FOOTER}}
  <script src="../allure-shell.js"></script>
</body>
</html>
