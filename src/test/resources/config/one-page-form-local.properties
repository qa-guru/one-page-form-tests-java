# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideStepsListener=false

# Local one-page-form/ over file:// + Selenoid hub
baseUrl=
basePath=../one-page-form/

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1740x1080
headless=true
closeBrowserAfterEach=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=http://local.selenoid/video/
remoteUrl=http://local.selenoid/wd/hub
