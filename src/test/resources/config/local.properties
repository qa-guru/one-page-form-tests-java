# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideStepsListener=false

# Base URL for http/https, example: "https://qa-guru.github.io/one-page-form/"
baseUrl=
# Base path for filesystem, example: "../one-page-form/"
basePath=../one-page-form/

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=false
closeBrowserAfterEach=falseTrue

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
