# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideStepsListener=false

# GitHub Pages one-page-form (login only) — cloud Selenoid
baseUrl=https://qa-guru.github.io/one-page-form/
basePath=

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1740x1080
headless=true
closeBrowserAfterEach=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=https://selenoid.autotests.cloud/video/
remoteUrl=https://user1:1234@selenoid.autotests.cloud/wd/hub
