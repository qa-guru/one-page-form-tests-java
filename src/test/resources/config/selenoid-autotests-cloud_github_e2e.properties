# selenoid-autotests-cloud_github — e2e (@Layer(e2e) — smoke via -DincludeTags=smoke -DexcludeTags=visual)
# gradle test -Denv=selenoid-autotests-cloud_github_e2e -DincludeTags=smoke -DexcludeTags=visual -Djunit.jupiter.execution.parallel.config.fixed.parallelism=3

# Allure report
allureReportMode=allure3

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=true
attachPageSource=true
attachVideo=true
# Allow allure steps listener
enableAllureSelenideListener=true

# Target app
baseUrl=https://qa-guru.github.io/one-page-form/
# basePath=

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=true
videoFolder=https://selenoid.autotests.cloud/video/
remoteUrl=https://user1:1234@selenoid.autotests.cloud/wd/hub

# Console log
logToConsole=false
selenideLogToConsole=false
rootLogLevel=warn
