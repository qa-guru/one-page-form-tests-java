# one-page-form_prod — e2e (@Layer(e2e) — smoke via -DincludeTags=smoke -DexcludeTags=visual)
# gradle test -Denv=one-page-form_prod_e2e -DincludeTags=smoke -DexcludeTags=visual -Djunit.jupiter.execution.parallel.config.fixed.parallelism=3

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
baseUrl=https://qa-guru.github.io/one-page-form/
# basePath=

# Browser configuration
browser=chrome
browserVersion=148
browserSize=1920x1280
headless=true
closeBrowserAfterEach=false
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=https://selenoid.autotests.cloud/video/
remoteUrl=https://user1:1234@selenoid.autotests.cloud/wd/hub
